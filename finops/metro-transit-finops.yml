specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Metro Transit
providerId: metro-transit
publisherName: Metropolitan Council (Metro Transit)
serviceCategory: Public Transit Open Data
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Minneapolis
  - Minnesota
  - Public Transportation
  - Real-Time
  - Transit
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps shape for Metro Transit: a free, open-data API surface (GTFS, GTFS-realtime,
  NexTrip / REST). There is no provider-side cost to the API consumer; FinOps focus shifts to the
  consumer-side compute / egress / storage cost of polling and serving the public data, plus the
  Metropolitan Council''s own publishing cost (which is not invoiced to consumers).'
sources:
  - https://svc.metrotransit.org/
  - https://www.metrotransit.org/developers
principles:
  - name: Visibility
    description: There is no Metro Transit invoice to track. Instead, monitor consumer-side metrics —
      poll rate per feed, bytes downloaded, cache hit rate — to understand the cost the public data
      surface generates inside your own infrastructure.
  - name: Allocation
    description: Allocate consumer-side cost (egress, compute, storage of GTFS archive) by the application
      or product feature consuming the data (commuter app, signage, internal analytics, ML training).
  - name: Optimization
    description: Cache GTFS-realtime feeds at a single edge / proxy and fan out to clients (instead of
      having each client poll svc.metrotransit.org directly). Use Last-Modified for the static GTFS zip
      to skip re-downloads. Match poll cadence to the 5-second refresh interval — polling faster is
      pure waste.
  - name: Accountability
    description: Designate a data-feed owner inside the consuming organization who tracks polling
      behavior, ensures attribution, and responds promptly if Metro Transit reports excessive load.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Reporting and Analytics
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Workload Optimization
      - Architecting for Cloud
  - name: Manage the FinOps Practice
    capabilities:
      - Onboarding Workloads
billingModel:
  pricingCategory: Free / Open Data
  billingFrequency: N/A
  billingCurrency: N/A
  chargeCategories: []
focusColumns:
  ServiceName: Metro Transit Open Data API
  ServiceCategory: Public Transit Open Data
  ProviderName: Metro Transit
  PublisherName: Metropolitan Council
  InvoiceIssuerName: N/A (free / open data)
  BillingCurrency: N/A
  ChargeCategory: N/A
meters:
  - name: realtime_polls
    description: Number of polls against GTFS-realtime feeds (consumer-side).
    unit: request
    aggregation: sum
    dimensions:
      - feed
      - consumer_app
  - name: gtfs_downloads
    description: GTFS static zip downloads (current + next-week + flex).
    unit: download
    aggregation: sum
    dimensions:
      - feed
      - consumer_app
  - name: rest_requests
    description: REST API requests (NexTrip, alerts, trip planner, schedule).
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - consumer_app
  - name: data_egress
    description: Bytes downloaded from svc.metrotransit.org (consumer-side accounting).
    unit: GB
    aggregation: sum
    dimensions:
      - feed
      - consumer_app
apis:
  - name: Metro Transit NexTrip API
    baseURL: https://svc.metrotransit.org/nextripv2
    tags:
      - Departures
      - Real-Time
      - Transit
    serviceName: Metro Transit NexTrip API
    serviceCategory: API
  - name: Metro Transit Service Alerts API
    baseURL: https://svc.metrotransit.org/alerts
    tags:
      - Alerts
      - Real-Time
      - Transit
    serviceName: Metro Transit Service Alerts API
    serviceCategory: API
  - name: Metro Transit Trip Planner API
    baseURL: https://svc.metrotransit.org/tripplanner
    tags:
      - Trip Planner
      - Routing
      - Transit
    serviceName: Metro Transit Trip Planner API
    serviceCategory: API
  - name: Metro Transit Schedule API
    baseURL: https://svc.metrotransit.org/schedule
    tags:
      - Schedule
      - Timetable
      - Transit
    serviceName: Metro Transit Schedule API
    serviceCategory: API
unitEconomics:
  - name: Internal Cost per Public-Data Poll
    metric: consumer_infra_cost / realtime_polls
    target: minimize via shared edge cache
  - name: Cache Hit Rate
    metric: cache_hits / (cache_hits + origin_polls)
    target: '> 0.95'
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
