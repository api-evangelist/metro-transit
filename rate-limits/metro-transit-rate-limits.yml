specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Metro Transit
providerId: metro-transit
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Minneapolis
  - Minnesota
  - Public Transportation
  - Real-Time
  - Transit
  - Rate Limiting
description: Metro Transit does not publish numeric rate limits or require an API key for its open-data
  GTFS, GTFS-realtime, and NexTrip / REST endpoints. The published guidance is that GTFS-realtime feeds
  refresh every 5 seconds (so polling faster than that is wasted) and that schedule data updates weekly
  (Saturdays). Consumers are expected to use HTTP conditional requests (Last-Modified / If-Modified-Since)
  rather than re-downloading the GTFS zip. There is no documented 429 throttle behavior; abusive volume
  would be addressed informally if it impacted service.
notes: |
  Reconciled against the published developer documentation at svc.metrotransit.org; that page states
  no authentication and no documented rate limit, with the natural cadence being 5-second refresh for
  realtime feeds and weekly refresh for schedules.
sources:
  - https://svc.metrotransit.org/
  - https://svc.metrotransit.org/swagger
responseCodes:
  serviceUnavailable: 503
limits:
  - name: GTFS-realtime poll cadence
    scope: public
    metric: requests_per_second
    limit: 'recommended cadence 1 poll per 5 seconds (feed refresh interval)'
    applies:
      - Metro Transit NexTrip API
      - Metro Transit Service Alerts API
    notes: Feeds (tripupdates.pb, vehiclepositions.pb, alerts.pb) refresh every 5 seconds; polling faster
      yields stale duplicates.
  - name: GTFS static refresh
    scope: public
    metric: requests_per_week
    limit: 'recommended once per Saturday refresh (use Last-Modified)'
    applies:
      - Metro Transit Schedule API
    notes: Static schedules are published weekly on Saturdays; honor Last-Modified / If-Modified-Since
      to avoid unnecessary downloads.
  - name: REST API
    scope: public
    metric: requests_per_second
    limit: 'no documented hard limit; observe fair-use'
    applies:
      - Metro Transit NexTrip API
      - Metro Transit Service Alerts API
      - Metro Transit Trip Planner API
      - Metro Transit Schedule API
    notes: Public REST endpoints have no published rate limit; expected consumption is at human-driven
      cadence (e.g. one stop departure board update per few seconds per active user).
policies:
  - name: Backoff Strategy
    description: On transient 5xx responses, back off exponentially with jitter and resume normal polling
      once successful responses return.
  - name: Conditional Requests
    description: Use HTTP Last-Modified / If-Modified-Since for the GTFS zip and other slowly-changing
      resources to minimize bandwidth and load on the public service.
  - name: Refresh Cadence
    description: Match polling cadence to the feed's natural refresh interval — 5 seconds for GTFS-realtime,
      weekly for static schedules — rather than polling at arbitrary frequency.
  - name: Open Data Etiquette
    description: Identify your User-Agent, attribute Metro Transit as the data source where appropriate,
      and avoid aggressive scraping that could degrade service for other public-data consumers.
maintainers:
