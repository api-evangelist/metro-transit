specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Metro Transit
providerId: metro-transit
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Minneapolis
  - Minnesota
  - Public Transportation
  - Real-Time
  - Transit
description: Metro Transit (the public-transit operator for the Twin Cities, MN, governed by the
  Metropolitan Council) publishes its real-time vehicle, schedule, alert, and trip-planner data as
  free open data. Static schedules are published as GTFS zip files; real-time vehicle positions, trip
  updates, and service alerts are published as GTFS-realtime protobuf feeds refreshed every 5 seconds.
  A REST API (NexTrip / schedule / alerts / trip planner) is also documented at svc.metrotransit.org.
  There is no API key, no usage cap, and no commercial tier — the data is offered to developers under
  open-data terms with attribution.
sources:
  - https://svc.metrotransit.org/
  - https://svc.metrotransit.org/swagger
  - https://www.metrotransit.org/developers
plans:
  - id: metro-transit-open-data
    name: Open Data
    type: freemium
    description: Free, open access to Metro Transit's GTFS, GTFS-realtime, and REST APIs. No registration,
      no API key, and no published usage cap. Consumers should follow standard open-data etiquette
      (use Last-Modified / ETag, cache appropriately, attribute the source).
    entries:
      - label: GTFS Static Schedule
        description: Weekly GTFS zip download (current and next-week schedules) covering routes, stops,
          trips, and timetables.
        name: gtfs_static
        type: flat
        metric: download
        limit: -1
        timeFrame: usage
        geo: US
        domains:
          - https://svc.metrotransit.org/mtgtfs/gtfs.zip
          - https://svc.metrotransit.org/mtgtfs/next/gtfs.zip
          - https://svc.metrotransit.org/mtgtfs/gtfs-flex.zip
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: GTFS-realtime Feeds
        description: Trip updates, vehicle positions, and service alerts as protobuf feeds, refreshed
          every 5 seconds.
        name: gtfs_realtime
        type: flat
        metric: poll
        limit: -1
        timeFrame: second
        geo: US
        domains:
          - https://svc.metrotransit.org/mtgtfs/tripupdates.pb
          - https://svc.metrotransit.org/mtgtfs/vehiclepositions.pb
          - https://svc.metrotransit.org/mtgtfs/alerts.pb
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: NexTrip / REST API
        description: REST endpoints for next-departure (NexTrip), schedules, service alerts, and trip
          planning, documented via Swagger.
        name: rest_api
        type: flat
        metric: request
        limit: -1
        timeFrame: usage
        geo: US
        domains:
          - https://svc.metrotransit.org/nextripv2
          - https://svc.metrotransit.org/alerts
          - https://svc.metrotransit.org/tripplanner
          - https://svc.metrotransit.org/schedule
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: GTFS Static Schedule (current + next week)
      - name: GTFS-realtime Trip Updates
      - name: GTFS-realtime Vehicle Positions
      - name: GTFS-realtime Service Alerts
      - name: NexTrip Real-Time Departures
      - name: Service Alerts API
      - name: Trip Planner API
      - name: Schedule API
      - name: Swagger / OpenAPI Documentation
      - name: Historical GTFS Archive (back to 2020-11-28)
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
